name: Deploy Application with Docker

on:
  push:
    branches:
      - main  # Déclenche le workflow sur un push vers la branche main

jobs:
  build-and-push:
    runs-on: ubuntu-latest  # Utiliser un environnement Ubuntu

    steps:
      # Étape 1: Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v3

      # Étape 2: Connexion à Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Étape 3: Construire et pousser l'image Docker
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./crmBackend  # Assurez-vous que ce chemin est correct
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-backend:latest
