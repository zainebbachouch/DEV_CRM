name: Deploy Backend with Quality Checks

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: crm_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Wait for MySQL
      - name: Wait for MySQL
        run: |
          for i in {1..60}; do
            if mysqladmin ping -h mysql -u root --password=root123 --silent; then
              echo "MySQL is ready!";
              break;
            fi
            echo "Waiting for MySQL...";
            sleep 2;
          done

      # Step 3: Update MySQL Authentication
      - name: Configure MySQL Authentication
        run: |
          docker exec $(docker ps -q --filter "ancestor=mysql:8.0") \
            mysql -u root --password=root123 -e \
            "ALTER USER 'root'@'%' IDENTIFIED WITH mysql_native_password BY 'root123'; FLUSH PRIVILEGES;"

      # Step 4: Initialize Database Schema
      - name: Initialize Database Schema
        run: |
          mysql -h mysql -u root --password=root123 crm_db < crmBackend/scripts/init.sql

      # Step 5: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18 # Adjust to your project's Node.js version

      # Step 6: Install dependencies
      - name: Install dependencies
        run: |
          cd crmBackend
          npm install

      # Step 7: Run ESLint (Quality check)
      - name: Run ESLint
        run: |
          cd crmBackend
          npx eslint .

      # Step 8: Run Unit Tests
      - name: Run Unit Tests
        env:
          NODE_ENV: test
          DB_HOST: mysql # Use 'mysql' for Docker networking
          DB_USERNAME: root
          DB_PASSWORD: root123
          DB_NAME: crm_db
        run: |
          cd crmBackend
          npm test

      # Step 9: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 10: Build and Push Docker Image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./crmBackend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-backend:latest
