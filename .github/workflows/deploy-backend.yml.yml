name: Deploy Backend with Quality Checks

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18 # Adjust to your project's Node.js version

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          cd crmBackend
          npm install

      # Step 4: Run ESLint (Quality check)
      - name: Run ESLint
        run: |
          cd crmBackend
          npx eslint .

      # Step 5: Run Unit Tests
      - name: Run Unit Tests
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1 # Use localhost for testing
          DB_USERNAME: root  # Replace with your test DB user
          DB_PASSWORD: root123 # Replace with your test DB password
          DB_NAME: crm_db # Use a separate test database
        run: |
          cd crmBackend
          npm test


      # Step 6: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 7: Build and Push Docker Image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./crmBackend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-backend:latest

      # Step 8: Deploy to Production (Optional)
      # Uncomment this section if you want to deploy directly after building.
      # For example, deploying to a server using SSH:
      # - name: Deploy to Production
      #   uses: appleboy/ssh-action@v0.1.6
      #   with:
      #     host: ${{ secrets.PRODUCTION_SERVER_HOST }}
      #     username: ${{ secrets.PRODUCTION_SERVER_USER }}
      #     password: ${{ secrets.PRODUCTION_SERVER_PASSWORD }}
      #     script: |
      #       docker pull ${{ secrets.DOCKER_USERNAME }}/my-backend:latest
      #       docker stop my-backend || true
      #       docker rm my-backend || true
      #       docker run -d --name my-backend -p 4000:4000 ${{ secrets.DOCKER_USERNAME }}/my-backend:latest
